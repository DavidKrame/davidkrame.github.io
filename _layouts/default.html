<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.author.name }}{% else %}{{ site.author.name }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  {% if page.url contains 'publications' %}
  <link rel="preconnect" href="https://api.semanticscholar.org">
  {% endif %}
</head>
<body>

  {% include nav.html %}
  <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>

  <main class="page-content">
    {{ content }}
  </main>

  {% include footer.html %}

  {% if page.url contains 'publications' %}
  <script src="{{ '/assets/js/publications.js' | relative_url }}"></script>
  {% endif %}
  <script src="{{ '/assets/js/progress.js' | relative_url }}"></script>

</body>
</html>
